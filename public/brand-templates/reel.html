<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>Capa de Reel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap');

    :root {
      --cor-primaria: #6B0F1A;
      --cor-secundaria: #F4ECE0;
      --cor-acento: #C4953B;
      --fonte-titulo: 'Playfair Display', Georgia, serif;
      --fonte-corpo: 'Lato', sans-serif;
      /* :root vars */
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
    }

    /* Container raiz — ocupa tudo */
    .root {
      width: 1080px;
      height: 1920px;
      position: relative;
      overflow: hidden;
    }

    /* --- CASO COM FOTO --- */
    /* Foto de fundo fullscreen */
    .bg-foto {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* Overlay gradient vinho to transparent */
    .overlay-foto {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        var(--cor-primaria) 0%,
        rgba(107, 15, 26, 0.88) 28%,
        rgba(107, 15, 26, 0.45) 60%,
        rgba(107, 15, 26, 0.08) 100%
      );
    }

    /* --- CASO SEM FOTO --- */
    /* Background solido com padrao SVG */
    .bg-sem-foto {
      display: none; /* oculto por padrao */
      position: absolute;
      inset: 0;
      background-color: var(--cor-primaria);
    }

    body[data-sem-foto] .bg-foto { display: none; }
    body[data-sem-foto] .overlay-foto { display: none; }
    body[data-sem-foto] .bg-sem-foto { display: block; }

    /* Padrao SVG textura sutil para sem-foto */
    .bg-sem-foto::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23F4ECE0' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    /* Aspas decorativas de fundo */
    .aspas-bg {
      position: absolute;
      top: 80px;
      right: -40px;
      font-family: 'Georgia', serif;
      font-size: 600px;
      line-height: 1;
      color: #ffffff;
      opacity: 0.06;
      pointer-events: none;
      user-select: none;
      z-index: 1;
    }

    /* Conteudo principal */
    .conteudo {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 88px 140px;
      z-index: 2;
    }

    .especialidade {
      font-family: var(--fonte-corpo);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--cor-secundaria);
      opacity: 0.9;
      margin-bottom: 28px;
    }

    .linha-dourada {
      width: 80px;
      height: 4px;
      background: var(--cor-acento);
      border-radius: 2px;
      margin-bottom: 44px;
    }

    .titulo {
      font-family: var(--fonte-titulo);
      font-size: 96px;
      font-weight: 700;
      line-height: 1.08;
      color: #ffffff;
      letter-spacing: -0.02em;
      margin-bottom: 36px;
    }

    .subtitulo {
      font-family: var(--fonte-corpo);
      font-size: 36px;
      font-weight: 300;
      line-height: 1.5;
      color: var(--cor-secundaria);
      opacity: 0.82;
      max-width: 880px;
      margin-bottom: 80px;
    }

    /* Rodape expert */
    .rodape {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .rodape-linha {
      width: 48px;
      height: 2px;
      background: var(--cor-acento);
      flex-shrink: 0;
    }

    .expert-name {
      font-family: var(--fonte-titulo);
      font-size: 34px;
      font-weight: 600;
      font-style: italic;
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="root">
    <!-- Background: foto ou solido -->
    <img class="bg-foto" src="{{foto_url}}" alt="" />
    <div class="overlay-foto"></div>
    <div class="bg-sem-foto"></div>

    <!-- Aspas decorativas -->
    <div class="aspas-bg">"</div>

    <!-- Conteudo -->
    <div class="conteudo">
      <div class="especialidade">{{especialidade}}</div>
      <div class="linha-dourada"></div>
      <h1 class="titulo">{{titulo}}</h1>
      <p class="subtitulo">{{subtitulo}}</p>
      <div class="rodape">
        <div class="rodape-linha"></div>
        <div class="expert-name">{{expert_name}}</div>
      </div>
    </div>
  </div>
</body>
</html>
