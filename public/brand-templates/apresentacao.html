<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920" />
  <title>Slide Apresentacao</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,900;1,400;1,600&family=Inter:wght@100;200;300;400;500;600;700;800&display=swap');

    :root {
      --cor-primaria: #6B0F1A;
      --cor-secundaria: #F4ECE0;
      --cor-acento: #C9A96E;
      --fonte-titulo: 'Playfair Display', Georgia, serif;
      --fonte-corpo: 'Inter', sans-serif;
      /* :root vars */
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
    }

    body {
      font-family: var(--fonte-corpo);
      background: #0F0F16;
      position: relative;
    }

    /* Background layers */
    .bg-base {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        #0F0F16 0%,
        #1A0508 40%,
        #0F0F16 100%
      );
    }

    /* Grade perspectiva sutil */
    .bg-grade {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(201, 169, 110, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201, 169, 110, 0.03) 1px, transparent 1px);
      background-size: 80px 80px;
    }

    /* Radial glow vermelho */
    .bg-glow {
      position: absolute;
      top: -200px;
      left: -200px;
      width: 900px;
      height: 900px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(107, 15, 26, 0.35) 0%, transparent 70%);
    }

    /* Radial glow ouro */
    .bg-glow-gold {
      position: absolute;
      bottom: -300px;
      right: -200px;
      width: 800px;
      height: 800px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201, 169, 110, 0.06) 0%, transparent 70%);
    }

    /* Layout principal: sidebar + conteudo */
    .layout {
      position: absolute;
      inset: 0;
      display: flex;
      z-index: 5;
    }

    /* Sidebar esquerda */
    .sidebar {
      width: 80px;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 0;
      border-right: 1px solid rgba(201, 169, 110, 0.08);
      gap: 20px;
    }

    .sidebar-top-bar {
      width: 2px;
      flex: 1;
      background: linear-gradient(to bottom, var(--cor-acento), rgba(201, 169, 110, 0.1));
      border-radius: 1px;
    }

    .sidebar-diamante {
      width: 10px;
      height: 10px;
      background: var(--cor-acento);
      transform: rotate(45deg);
    }

    .sidebar-bottom-bar {
      width: 2px;
      height: 60px;
      background: rgba(201, 169, 110, 0.1);
      border-radius: 1px;
    }

    /* Area principal */
    .area-principal {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 72px 120px 68px 80px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-esquerda {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .categoria {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--cor-acento);
    }

    .subtitulo-header {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.06em;
    }

    .header-direita {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo-header {
      width: 48px;
      height: 48px;
      object-fit: contain;
      border-radius: 6px;
      opacity: 0.8;
    }

    .logo-placeholder-header {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(201, 169, 110, 0.15);
    }

    .numero-slide {
      font-family: var(--fonte-titulo);
      font-size: 48px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.05);
      line-height: 1;
    }

    /* Area central: conteudo principal */
    .centro {
      display: flex;
      flex-direction: column;
      gap: 32px;
      max-width: 1100px;
    }

    .linha-pre-titulo {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .linha-decorativa {
      width: 48px;
      height: 2px;
      background: var(--cor-acento);
      border-radius: 1px;
    }

    .pre-titulo-tag {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(201, 169, 110, 0.7);
    }

    .titulo {
      font-family: var(--fonte-titulo);
      font-size: 88px;
      font-weight: 700;
      line-height: 1.0;
      color: #ffffff;
      letter-spacing: -0.03em;
    }

    .titulo .destaque {
      color: transparent;
      -webkit-text-stroke: 1px rgba(201, 169, 110, 0.6);
    }

    .corpo {
      font-family: var(--fonte-corpo);
      font-size: 22px;
      font-weight: 300;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.5);
      max-width: 800px;
    }

    /* Rodape */
    .rodape {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .rodape-esquerda {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .expert-name {
      font-family: var(--fonte-titulo);
      font-size: 26px;
      font-weight: 600;
      font-style: italic;
      color: rgba(255, 255, 255, 0.75);
    }

    .expert-cargo {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.25);
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      padding: 16px 40px;
      border: 1px solid rgba(201, 169, 110, 0.35);
      color: var(--cor-acento);
      font-family: var(--fonte-corpo);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-radius: 2px;
    }

    /* Foto do expert — posicionada como elemento flutuante */
    .foto-expert-container {
      position: absolute;
      right: 120px;
      bottom: 0;
      width: 400px;
      height: 680px;
      z-index: 4;
      overflow: hidden;
    }

    .foto-expert {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }

    /* Gradiente para fundir foto com fundo */
    .foto-fade-base {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 200px;
      background: linear-gradient(to top, #0F0F16, transparent);
    }

    .foto-fade-left {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 120px;
      background: linear-gradient(to right, #0F0F16, transparent);
    }

    .foto-fade-right {
      position: absolute;
      top: 0;
      bottom: 0;
      right: 0;
      width: 60px;
      background: linear-gradient(to left, #0F0F16, transparent);
    }

    /* Linha de acento na base */
    .linha-base {
      position: absolute;
      bottom: 0;
      left: 80px;
      right: 0;
      height: 2px;
      background: linear-gradient(
        to right,
        var(--cor-acento),
        rgba(201, 169, 110, 0.1) 60%,
        transparent 100%
      );
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="bg-base"></div>
  <div class="bg-grade"></div>
  <div class="bg-glow"></div>
  <div class="bg-glow-gold"></div>

  <!-- Layout principal -->
  <div class="layout">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-top-bar"></div>
      <div class="sidebar-diamante"></div>
      <div class="sidebar-bottom-bar"></div>
    </div>

    <!-- Area principal -->
    <div class="area-principal">
      <!-- Header -->
      <div class="header">
        <div class="header-esquerda">
          <div class="categoria">Apresentacao</div>
          <div class="subtitulo-header">{{subtitulo}}</div>
        </div>
        <div class="header-direita">
          <div class="numero-slide">01</div>
          <img class="logo-header" src="{{logo_url}}" alt="logo"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='block'" />
          <div class="logo-placeholder-header" style="display:none;"></div>
        </div>
      </div>

      <!-- Centro -->
      <div class="centro">
        <div class="linha-pre-titulo">
          <div class="linha-decorativa"></div>
          <span class="pre-titulo-tag">{{especialidade}}</span>
        </div>
        <h1 class="titulo">{{titulo}}</h1>
        <p class="corpo">{{corpo}}</p>
      </div>

      <!-- Rodape -->
      <div class="rodape">
        <div class="rodape-esquerda">
          <div class="expert-name">{{expert_name}}</div>
          <div class="expert-cargo">{{especialidade}}</div>
        </div>
        <div class="cta-btn">
          {{cta}} →
        </div>
      </div>
    </div>
  </div>

  <!-- Foto do expert -->
  <div class="foto-expert-container">
    <img class="foto-expert" src="{{foto_url}}" alt="{{expert_name}}"
      onerror="this.parentElement.style.display='none'" />
    <div class="foto-fade-base"></div>
    <div class="foto-fade-left"></div>
    <div class="foto-fade-right"></div>
  </div>

  <!-- Linha de acento na base -->
  <div class="linha-base"></div>
</body>
</html>
