<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=600" />
  <title>Header de Email</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --cor-primaria: #6B0F1A;
      --cor-secundaria: #F4ECE0;
      --cor-acento: #C9A96E;
      --fonte-titulo: 'Playfair Display', Georgia, serif;
      --fonte-corpo: 'Inter', sans-serif;
      /* :root vars */
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 600px;
      height: 200px;
      overflow: hidden;
    }

    body {
      font-family: var(--fonte-corpo);
      position: relative;
      background: var(--cor-primaria);
    }

    /* Camada de fundo com gradiente sutil */
    .bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        var(--cor-primaria) 0%,
        #3D0710 55%,
        #1C0308 100%
      );
    }

    /* Ornamentos geometricos minimalistas */
    .ornamento-circulo {
      position: absolute;
      top: -60px;
      right: -40px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 1px solid rgba(201, 169, 110, 0.12);
    }

    .ornamento-circulo-2 {
      position: absolute;
      bottom: -80px;
      left: 160px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(201, 169, 110, 0.04);
    }

    /* Linha de acento no topo */
    .barra-topo {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(
        to right,
        var(--cor-acento) 0%,
        rgba(201, 169, 110, 0.3) 100%
      );
      z-index: 10;
    }

    /* Layout principal horizontal */
    .layout {
      position: absolute;
      inset: 3px 0 0 0;
      display: flex;
      align-items: center;
      padding: 0 40px;
      z-index: 5;
      gap: 36px;
    }

    /* Area de logo */
    .logo-area {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border-radius: 6px;
    }

    .logo-placeholder {
      width: 56px;
      height: 56px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(201, 169, 110, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Divisor vertical */
    .divisor {
      width: 1px;
      height: 56px;
      background: rgba(201, 169, 110, 0.2);
      flex-shrink: 0;
    }

    /* Area de texto */
    .texto-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nome-marca {
      font-family: var(--fonte-titulo);
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .tagline {
      font-family: var(--fonte-corpo);
      font-size: 12px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 0.05em;
      line-height: 1.4;
    }

    /* CTA lado direito */
    .cta-area {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .cta-btn {
      display: inline-block;
      padding: 10px 24px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(201, 169, 110, 0.35);
      color: var(--cor-acento);
      font-family: var(--fonte-corpo);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border-radius: 2px;
      white-space: nowrap;
    }

    .expert-name {
      font-family: var(--fonte-titulo);
      font-size: 13px;
      font-weight: 400;
      font-style: italic;
      color: rgba(255, 255, 255, 0.4);
    }

    /* Linha de acento na base */
    .barra-base {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(201, 169, 110, 0.15);
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="ornamento-circulo"></div>
  <div class="ornamento-circulo-2"></div>
  <div class="barra-topo"></div>

  <div class="layout">
    <!-- Logo -->
    <div class="logo-area">
      <img class="logo-img" src="{{logo_url}}" alt="logo"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'" />
      <div class="logo-placeholder" style="display:none;"></div>
    </div>

    <!-- Divisor -->
    <div class="divisor"></div>

    <!-- Texto -->
    <div class="texto-area">
      <div class="nome-marca">{{expert_name}}</div>
      <div class="tagline">{{subtitulo}}</div>
    </div>

    <!-- CTA -->
    <div class="cta-area">
      <div class="cta-btn">{{cta}}</div>
      <div class="expert-name">{{especialidade}}</div>
    </div>
  </div>

  <div class="barra-base"></div>
</body>
</html>
