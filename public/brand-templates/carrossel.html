<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>Slide de Carrossel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap');

    :root {
      --cor-primaria: #6B0F1A;
      --cor-secundaria: #F4ECE0;
      --cor-acento: #C4953B;
      --fonte-titulo: 'Playfair Display', Georgia, serif;
      --fonte-corpo: 'Lato', sans-serif;
      /* :root vars */
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
    }

    body {
      background-color: #ffffff;
      font-family: var(--fonte-corpo);
      position: relative;
    }

    /* Borda superior vinho */
    .borda-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 10px;
      background-color: var(--cor-primaria);
      z-index: 10;
    }

    /* Borda inferior acento */
    .borda-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background-color: var(--cor-acento);
      z-index: 10;
    }

    /* Numero decorativo gigante — background */
    .num-decorativo {
      position: absolute;
      top: -40px;
      left: -20px;
      font-family: var(--fonte-titulo);
      font-size: 480px;
      font-weight: 700;
      line-height: 1;
      color: var(--cor-primaria);
      opacity: 0.05;
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }

    /* Conteudo principal */
    .main {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 72px 88px 64px;
    }

    /* Topo: badge de numeracao */
    .topo {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 52px;
    }

    .badge-numero {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .badge-texto {
      font-family: var(--fonte-corpo);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--cor-primaria);
    }

    .badge-separador {
      width: 1px;
      height: 20px;
      background: var(--cor-primaria);
      opacity: 0.3;
    }

    .badge-total {
      font-family: var(--fonte-corpo);
      font-size: 22px;
      font-weight: 400;
      color: var(--cor-primaria);
      opacity: 0.5;
    }

    /* Linha acento */
    .linha-acento {
      width: 60px;
      height: 3px;
      background: var(--cor-acento);
      border-radius: 2px;
    }

    /* Titulo */
    .titulo {
      font-family: var(--fonte-titulo);
      font-size: 72px;
      font-weight: 700;
      line-height: 1.1;
      color: var(--cor-primaria);
      letter-spacing: -0.02em;
      margin-bottom: 44px;
      flex-shrink: 0;
    }

    /* Corpo */
    .corpo {
      font-family: var(--fonte-corpo);
      font-size: 32px;
      font-weight: 400;
      line-height: 1.72;
      color: #4A4A4A;
      flex: 1;
    }

    /* Rodape */
    .rodape {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-top: 40px;
    }

    .rodape-linha {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--cor-acento), transparent);
    }

    .expert-name {
      font-family: var(--fonte-titulo);
      font-size: 26px;
      font-weight: 600;
      font-style: italic;
      color: var(--cor-acento);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="borda-top"></div>
  <div class="borda-bottom"></div>

  <!-- Numero decorativo de fundo -->
  <div class="num-decorativo">{{numero_slide}}</div>

  <div class="main">
    <!-- Topo com badge -->
    <div class="topo">
      <div class="badge-numero">
        <span class="badge-texto">{{numero_slide}}</span>
        <span class="badge-separador"></span>
        <span class="badge-total">{{total_slides}}</span>
      </div>
      <div class="linha-acento"></div>
    </div>

    <!-- Titulo -->
    <h1 class="titulo">{{titulo}}</h1>

    <!-- Corpo -->
    <p class="corpo">{{corpo}}</p>

    <!-- Rodape -->
    <div class="rodape">
      <div class="rodape-linha"></div>
      <div class="expert-name">{{expert_name}}</div>
    </div>
  </div>
</body>
</html>
