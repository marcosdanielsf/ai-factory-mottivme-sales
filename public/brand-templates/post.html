<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>Post Elegante</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap');

    :root {
      --cor-primaria: #6B0F1A;
      --cor-secundaria: #F4ECE0;
      --cor-acento: #C4953B;
      --fonte-titulo: 'Playfair Display', Georgia, serif;
      --fonte-corpo: 'Lato', sans-serif;
      /* :root vars */
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
    }

    body {
      background-color: var(--cor-secundaria);
      font-family: var(--fonte-corpo);
      display: flex;
      flex-direction: row;
      position: relative;
    }

    /* Barra lateral vertical */
    .sidebar {
      width: 14px;
      min-height: 1080px;
      background-color: var(--cor-primaria);
      flex-shrink: 0;
    }

    /* Linha decorativa secundaria */
    .sidebar-accent {
      width: 4px;
      min-height: 1080px;
      background-color: var(--cor-acento);
      flex-shrink: 0;
      opacity: 0.6;
    }

    /* Area principal */
    .main {
      flex: 1;
      padding: 64px 72px 56px 60px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background-color: var(--cor-secundaria);
      position: relative;
      overflow: hidden;
    }

    /* Ornamento de fundo — circulo decorativo */
    .main::before {
      content: '';
      position: absolute;
      bottom: -160px;
      right: -120px;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: var(--cor-primaria);
      opacity: 0.04;
      pointer-events: none;
    }

    /* TOPO */
    .topo {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .especialidade {
      font-family: var(--fonte-corpo);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cor-primaria);
      opacity: 0.75;
    }

    .linha-decorativa {
      width: 72px;
      height: 3px;
      background: var(--cor-acento);
      border-radius: 2px;
    }

    /* CENTRO */
    .centro {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      flex: 1;
      justify-content: center;
      padding: 24px 0;
    }

    .foto-expert {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid var(--cor-primaria);
      box-shadow: 0 8px 32px rgba(107, 15, 26, 0.25);
      display: block;
    }

    /* Ocultar foto quando data-sem-foto esta no body */
    body[data-sem-foto] .foto-expert {
      display: none;
    }

    .titulo {
      font-family: var(--fonte-titulo);
      font-size: 68px;
      font-weight: 700;
      line-height: 1.12;
      color: var(--cor-primaria);
      text-align: center;
      letter-spacing: -0.02em;
    }

    .subtitulo {
      font-family: var(--fonte-corpo);
      font-size: 30px;
      font-weight: 300;
      line-height: 1.5;
      color: #3A2A2D;
      text-align: center;
      opacity: 0.85;
      max-width: 820px;
    }

    /* RODAPE */
    .rodape {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .expert-name {
      font-family: var(--fonte-titulo);
      font-size: 28px;
      font-weight: 600;
      font-style: italic;
      color: var(--cor-primaria);
    }

    .cta-btn {
      display: inline-block;
      padding: 18px 44px;
      background-color: var(--cor-primaria);
      color: var(--cor-secundaria);
      font-family: var(--fonte-corpo);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 4px;
      border: none;
    }
  </style>
</head>
<body>
  <div class="sidebar"></div>
  <div class="sidebar-accent"></div>

  <div class="main">
    <!-- TOPO -->
    <div class="topo">
      <div class="especialidade">{{especialidade}}</div>
      <div class="linha-decorativa"></div>
    </div>

    <!-- CENTRO -->
    <div class="centro">
      <img class="foto-expert" src="{{foto_url}}" alt="{{expert_name}}" />
      <h1 class="titulo">{{titulo}}</h1>
      <p class="subtitulo">{{subtitulo}}</p>
    </div>

    <!-- RODAPE -->
    <div class="rodape">
      <div class="expert-name">{{expert_name}}</div>
      <div class="cta-btn">{{cta}}</div>
    </div>
  </div>
</body>
</html>
