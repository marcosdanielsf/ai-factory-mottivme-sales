<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>Status WhatsApp</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700;800&display=swap');

    :root {
      --cor-primaria: #6B0F1A;
      --cor-secundaria: #F4ECE0;
      --cor-acento: #C9A96E;
      --fonte-titulo: 'Playfair Display', Georgia, serif;
      --fonte-corpo: 'Inter', sans-serif;
      /* :root vars */
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
    }

    body {
      font-family: var(--fonte-corpo);
      position: relative;
    }

    /* Background com camadas */
    .bg {
      position: absolute;
      inset: 0;
      background: #1C1C24;
    }

    /* Gradiente superior — acento de cor */
    .bg-gradient-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 680px;
      background: linear-gradient(
        180deg,
        var(--cor-primaria) 0%,
        rgba(107, 15, 26, 0.85) 50%,
        rgba(28, 28, 36, 0) 100%
      );
    }

    /* Textura sutil */
    .bg-texture {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 15%, rgba(201, 169, 110, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 85%, rgba(107, 15, 26, 0.15) 0%, transparent 50%);
    }

    /* Ornamentos geometricos */
    .ornamento-1 {
      position: absolute;
      top: 60px;
      right: -80px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      border: 1px solid rgba(201, 169, 110, 0.15);
    }

    .ornamento-2 {
      position: absolute;
      top: 160px;
      right: 20px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 1px solid rgba(201, 169, 110, 0.08);
    }

    .ornamento-3 {
      position: absolute;
      bottom: 200px;
      left: -60px;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: var(--cor-primaria);
      opacity: 0.08;
    }

    /* Linha de progresso estilo WA Stories */
    .progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255, 255, 255, 0.15);
      z-index: 10;
    }

    .progress-fill {
      height: 100%;
      width: 60%;
      background: #ffffff;
      border-radius: 0 2px 2px 0;
    }

    /* Conteudo principal */
    .conteudo {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 140px 88px;
      text-align: center;
    }

    /* Icone de marca / logo area */
    .marca-topo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 80px;
    }

    .logo-circulo {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 2px solid rgba(201, 169, 110, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.04);
    }

    .logo-img {
      width: 64px;
      height: 64px;
      object-fit: contain;
    }

    .marca-separador {
      width: 1px;
      height: 32px;
      background: linear-gradient(to bottom, rgba(201, 169, 110, 0.5), transparent);
    }

    /* Destaque / tag */
    .tag-destaque {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      border: 1px solid rgba(201, 169, 110, 0.35);
      border-radius: 2px;
      margin-bottom: 48px;
    }

    .tag-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--cor-acento);
    }

    .tag-text {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--cor-acento);
    }

    /* Titulo principal */
    .titulo {
      font-family: var(--fonte-titulo);
      font-size: 96px;
      font-weight: 700;
      line-height: 1.05;
      color: #ffffff;
      letter-spacing: -0.03em;
      text-shadow: 0 8px 48px rgba(0, 0, 0, 0.4);
      margin-bottom: 44px;
    }

    /* Separador decorativo */
    .separador {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 44px;
      width: 100%;
      max-width: 480px;
    }

    .sep-linha {
      flex: 1;
      height: 1px;
      background: rgba(201, 169, 110, 0.25);
    }

    .sep-diamante {
      width: 8px;
      height: 8px;
      background: var(--cor-acento);
      transform: rotate(45deg);
    }

    /* Corpo / subtitulo */
    .corpo {
      font-family: var(--fonte-corpo);
      font-size: 34px;
      font-weight: 300;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.7);
      max-width: 820px;
    }

    /* CTA Block */
    .cta-block {
      position: absolute;
      bottom: 160px;
      left: 0;
      right: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      padding: 28px 72px;
      background: var(--cor-primaria);
      color: #ffffff;
      font-family: var(--fonte-corpo);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 4px;
    }

    .cta-icone {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .cta-icone span {
      display: block;
      width: 20px;
      height: 2px;
      background: #ffffff;
      border-radius: 1px;
    }

    .cta-icone span:last-child {
      width: 12px;
    }

    /* Expert name no rodape */
    .rodape {
      position: absolute;
      bottom: 72px;
      left: 0;
      right: 0;
      z-index: 5;
      text-align: center;
    }

    .expert-name {
      font-family: var(--fonte-titulo);
      font-size: 28px;
      font-weight: 400;
      font-style: italic;
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="bg-gradient-top"></div>
  <div class="bg-texture"></div>

  <!-- Ornamentos -->
  <div class="ornamento-1"></div>
  <div class="ornamento-2"></div>
  <div class="ornamento-3"></div>

  <!-- Barra de progresso estilo stories -->
  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>

  <!-- Conteudo central -->
  <div class="conteudo">
    <!-- Logo / marca topo -->
    <div class="marca-topo">
      <div class="logo-circulo">
        <img class="logo-img" src="{{logo_url}}" alt="logo" onerror="this.parentElement.innerHTML=''" />
      </div>
      <div class="marca-separador"></div>
    </div>

    <!-- Tag destaque -->
    <div class="tag-destaque">
      <div class="tag-dot"></div>
      <span class="tag-text">Novidade</span>
    </div>

    <h1 class="titulo">{{titulo}}</h1>

    <div class="separador">
      <div class="sep-linha"></div>
      <div class="sep-diamante"></div>
      <div class="sep-linha"></div>
    </div>

    <p class="corpo">{{corpo}}</p>
  </div>

  <!-- CTA -->
  <div class="cta-block">
    <div class="cta-btn">
      {{cta}}
      <div class="cta-icone">
        <span></span>
        <span></span>
        <span style="width:12px;"></span>
      </div>
    </div>
  </div>

  <!-- Rodape -->
  <div class="rodape">
    <div class="expert-name">{{expert_name}}</div>
  </div>
</body>
</html>
